<p class="all-notes">All Notes</p>
<main class="notes-list">
    @for (item of noteList; track $index) {

        <div class="note-card">

            <div class="title">
                {{item.title}}
            </div>

            <div class="content">
                {{item.notes}}
            </div>

            <div class="date">
                {{item.lastModified}}
            </div>
        </div>
    }
</main>

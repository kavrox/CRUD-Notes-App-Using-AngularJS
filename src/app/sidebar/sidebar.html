<main class="sidebar">
    <button type="button" class="new-note-btn" (click)="newNote()">
        <span class="plus">+</span>
        New Note
    </button>

    <h5 class="cat">CATEGORIES</h5>

    <div class="category-list">

        <div class="category-item" (click)="catClicked('General')">
            <span>📋 All Notes</span>
            <span class="count">{{gC}}</span>
        </div>

        <div class="category-item" (click)="catClicked('Personal')">
            <span>👤 Personal</span>
            <span class="count">{{pC}}</span>
        </div>

        <div class="category-item" (click)="catClicked('Work')">
            <span>💼 Work</span>
            <span class="count">{{wC}}</span>
        </div>

        <div class="category-item" (click)="catClicked('Ideas')">
            <span>💡 Ideas</span>
            <span class="count">{{iC}}</span>
        </div>
    </div>
</main>
